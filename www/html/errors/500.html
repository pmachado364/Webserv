<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Internal Server Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .switch {
            position: fixed;
            top: 20px;
            right: 20px;
            display: inline-block;
            width: 50px;
            height: 28px;
            z-index: 100;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0;
            right: 0; bottom: 0;
            background-color: #ccc;
            border-radius: 28px;
            transition: 0.4s;
        }
        .slider::before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.4s;
        }
        input:checked + .slider {
            background-color: #333;
        }
        input:checked + .slider::before {
            transform: translateX(22px);
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: grid;
            width: 100%;
            font-family: Inconsolata, monospace;
            background: #f5f5f5;
        }

        #error {
            position: relative;
            margin: auto;
            padding: 20px;
            z-index: 2;
        }

        #box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid #000;
        }

        #box::before,
        #box::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0px 0px 0px 1px #000;
            mix-blend-mode: multiply;
            animation: dance 2s infinite steps(1);
        }

        #box::before {
            clip-path: polygon(0 0, 65% 0, 35% 100%, 0 100%);
            box-shadow: inset 0px 0px 0px 1px magenta;
        }

        #box::after {
            clip-path: polygon(65% 0, 100% 0, 100% 100%, 35% 100%);
            animation-duration: 0.5s;
            animation-direction: alternate;
            box-shadow: inset 0px 0px 0px 1px cyan;
        }

        h3 {
            position: relative;
            font-size: 5vw;
            font-weight: 700;
            text-transform: uppercase;
            animation: blink 1.3s infinite steps(1);
            margin: 0 0 10px 0;
        }

        h3::before,
        h3::after {
            content: 'ERROR 500';
            position: absolute;
            top: -1px;
            left: 0;
            mix-blend-mode: soft-light;
            animation: dance 2s infinite steps(2);
        }

        h3::before {
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
            color: magenta;
            animation: shiftright 200ms steps(2) infinite;
        }

        h3::after {
            clip-path: polygon(0 100%, 100% 100%, 100% 50%, 0 50%);
            color: cyan;
            animation: shiftleft 200ms steps(2) infinite;
        }

        p {
            position: relative;
            margin-bottom: 8px;
        }

        #error span {
            position: relative;
            display: inline-block;
            font-weight: bold;
            color: #000;
            animation: blink 3s steps(1) infinite;
        }

        #error span::before,
        #error span::after {
            content: 'unstable';
            position: absolute;
            top: -1px;
            left: 0;
            mix-blend-mode: multiply;
        }

        #error span::before {
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
            color: magenta;
            animation: shiftright 1.5s steps(2) infinite;
        }

        #error span::after {
            clip-path: polygon(0 100%, 100% 100%, 100% 50%, 0 50%);
            color: cyan;
            animation: shiftleft 1.7s steps(2) infinite;
        }

        a {
            text-decoration: none;
        }

        button {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            font-family: Inconsolata, monospace;
            font-size: 1rem;
            background-color: #000;
            color: #fff;
            border: 2px solid #000;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        button:hover {
            background-color: #333;
            border-color: #333;
        }

        @keyframes dance {
            0%, 84%, 94% { transform: skew(0deg); }
            85% { transform: skew(5deg); }
            90% { transform: skew(-5deg); }
            98% { transform: skew(3deg); }
        }

        @keyframes shiftleft {
            0%, 87%, 100% { transform: translate(0, 0) skew(0deg); }
            84%, 90% { transform: translate(-8px, 0) skew(20deg); }
        }

        @keyframes shiftright {
            0%, 87%, 100% { transform: translate(0, 0) skew(0deg); }
            84%, 90% { transform: translate(8px, 0) skew(20deg); }
        }

        @keyframes blink {
            0%, 50%, 85%, 100% { color: #000; }
            87%, 95% { color: transparent; }
        }
        body.night { background: #0f172a; }
        body.night span, body.night h3::before { color: #ff2f92; }
        body.night h3::after, body.night span::after { color: #00fff0; }
        body.night button.home-btn { background-color:#222; border-color:#222; color:#fff; }
        body.night button.home-btn:hover { background-color:#444; border-color:#444; }
    </style>
</head>
<body>
    <div id="mode-toggle-container">
        <label class="switch">
            <input type="checkbox" id="mode-toggle">
            <span class="slider"></span>
        </label>
    </div>
    <div id="error">
        <div id="box"></div>
        <h3>ERROR 500</h3>
        <p>Things are a little <span>unstable</span> here</p>
        <p>I suggest come back later</p>
        <a href="../homepage.html">
            <button>Go back to homepage</button>
        </a>
    </div>
    <script>
        const toggle = document.getElementById('mode-toggle');
        toggle.addEventListener('change', () => {
            document.body.classList.toggle('night', toggle.checked);
        });
    </script>
</body>
</html>

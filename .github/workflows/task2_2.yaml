name: T2.2 - Body Handling, Chunked Decoding & Response Builder

on:
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Check PR Title
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Validate PR Title
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          if ! echo "$TITLE" | grep -qE "^T[0-9]\.[0-9]*"; then
            echo "FAIL: PR title does not match the required format 'T[sprint].[task] - [description]'"
            exit 1
          fi

          PR_SPRINT=$(echo "$TITLE" | grep -oP "^T\K[0-9]+(?=\.)")
          PR_TASK=$(echo "$TITLE" | grep -oP "^T[0-9]+\.\K[0-9]+")

          SPRINT=2
          TASK=2

          if [ "$PR_SPRINT" -gt "$SPRINT" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$PR_SPRINT" -eq "$SPRINT" ] && [ "$PR_TASK" -eq "$TASK" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "SKIP: PR T${PR_SPRINT}.${PR_TASK} does not require T${SPRINT}.${TASK} tests"
          fi

  Task_2-2_Response_Builder_Tests:
    name: Task 2.2 - Body Handling, Chunked Decoding & Response Builder
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
      options: --cap-add=SYS_PTRACE
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y make g++ strace netcat-openbsd curl procps

      - uses: actions/checkout@v5

      # ═══════════════════════════════════════════════════════
      # BUILD
      # ═══════════════════════════════════════════════════════
      - name: Compile with strict flags
        run: make

      - name: Verify binary exists
        run: test -f ./webserv && echo "Binary exists"

      # ═══════════════════════════════════════════════════════
      # Create large static file for partial-send test
      # ═══════════════════════════════════════════════════════

      - name: Prepare test fixtures
        run: |
          DOCROOT="www/html"
          mkdir -p "$DOCROOT"
          if [ ! -f "$DOCROOT/index.html" ]; then
            echo "<html><body>OK</body></html>" > "$DOCROOT/index.html"
          fi

      # ═══════════════════════════════════════════════════════
      # START SERVER
      # ═══════════════════════════════════════════════════════

      - name: Start server
        run: |
          ./webserv config/default.conf &
          echo $! > /tmp/webserv.pid
          sleep 1
          PID=$(cat /tmp/webserv.pid)
          kill -0 $PID && echo "Server running (PID $PID)"

      # ═══════════════════════════════════════════════════════
      # Test 1: GET / — status line and required headers present
      # ═══════════════════════════════════════════════════════

      - name: "Test 1: GET / — status line and required headers present"
        run: |
          RESPONSE=$(curl -sv http://localhost:8080/ 2>&1)

          echo "$RESPONSE"

          if ! echo "$RESPONSE" | grep -q "HTTP/1.1 200"; then
            echo "FAIL: expected HTTP/1.1 200 OK"
            exit 1
          fi

          for HEADER in "Date:" "Server:" "Content-Length" "Content-Type:"; do
            if ! echo "$RESPONSE" | grep -qi "$HEADER"; then
              echo "FAIL: missing required header '$HEADER'"
              exit 1
            fi
          done

          CL=$(echo "$RESPONSE" | grep -i "content-length:" | grep -oP '\d+')
          if [ -z "$CL" ]; then
            echo "FAIL: Content-Length header has no numeric value"
            exit 1
          fi

          if ! echo "$RESPONSE" | grep -qP "Date: \w{3}, \d{2} \w{3} \d{4} \d{2}:\d{2}:\d{2} GMT"; then
            echo "FAIL: Date header missing or wrong format (must be UTF RFC 7231)"
            exit 1
          fi

          echo "PASS: 200 OK with Date, Server, Content-Type, Content-Lenght"

      # ═══════════════════════════════════════════════════════
      # FINAL HEALTH CHECK
      # ═══════════════════════════════════════════════════════
      - name: "Final health check"
        run: |
          PID=$(cat /tmp/webserv.pid)

          if ! kill -0 $PID 2>/dev/null; then
            echo "FAIL: server is not running after tests"
            echo "Server log:"
            cat /tmp/webserv.log || true
            exit 1
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 5 http://localhost:8080/ 2>/dev/null || echo "000")
          echo "Final health check response: $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 100 ] || [ "$HTTP_CODE" -ge 600 ]; then
            echo "FAIL: server unresponsive after all tests"
            exit 1
          fi

          echo "PASS: server healthy after full test suite"

      # ═══════════════════════════════════════════════════════
      # Test 3: POST body exceeds client_max_body_size → 413
      # ═══════════════════════════════════════════════════════
      - name: "Test 3: POST body exceeds max size returns 413"
        run: |
          # Generate a body larger than client_max_body_size (2 MB, limit is 1M)
          dd if=/dev/zero of=/tmp/bigfile bs=1024 count=2048 2>/dev/null

          # Test with the file - capture only the HTTP code
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Expect:" \
              --data-binary @/tmp/bigfile \
              --max-time 10 \
              http://localhost:8080/ 2>/dev/null || echo "000")

          # Clean up
          rm -f /tmp/bigfile

          echo "HTTP code for oversized body: $HTTP_CODE"

          if [ "$HTTP_CODE" != "413" ]; then
            echo "FAIL: expected 413 Payload Too Large, got $HTTP_CODE"
            exit 1
          fi

          echo "PASS: oversized POST body correctly rejected with 413"

      # ═══════════════════════════════════════════════════════
      # Test 5: HEAD request — headers only, no body bytes
      # ═══════════════════════════════════════════════════════
      - name: "Test 5: HEAD returns headers only, zero body bytes"
        run: |
          # Use raw netcat to send HEAD and capture exact response
          REQUEST="HEAD / HTTP/1.1\r\nHost: localhost:8080\r\nConnection: close\r\n\r\n"
          
          RESPONSE=$(printf "$REQUEST" | nc -q 2 127.0.0.1 8080 2>/dev/null || \
                     printf "$REQUEST" | nc -w 2 127.0.0.1 8080 2>/dev/null)

          echo "HEAD response:"
          echo "$RESPONSE"

          # Must return 200
          if ! echo "$RESPONSE" | grep -q "HTTP/1.1 200"; then
            echo "FAIL: HEAD did not return 200"
            exit 1
          fi

          # HEAD must have Content-Length header
          if ! echo "$RESPONSE" | grep -qi "Content-Length:"; then
            echo "FAIL: HEAD response missing Content-Length"
            exit 1
          fi

          # Check that response ends with \r\n\r\n (headers only, no body)
          # The response should be ONLY headers - check there's no content after the blank line
          HEADER_END=$(printf "$REQUEST" | nc -q 2 127.0.0.1 8080 2>/dev/null | sed -n '/^\r$/q;p' | wc -c || echo "0")
          TOTAL_SIZE=$(printf "$REQUEST" | nc -q 2 127.0.0.1 8080 2>/dev/null | wc -c || echo "0")
          
          # Account for the \r\n\r\n separator (4 bytes)
          BODY_SIZE=$((TOTAL_SIZE - HEADER_END - 4))
          
          echo "Total response size: $TOTAL_SIZE"
          echo "Header size: $HEADER_END"
          echo "Body size: $BODY_SIZE"

          if [ "$BODY_SIZE" -gt 0 ]; then
            echo "FAIL: HEAD response contains body bytes (must be 0)"
            exit 1
          fi

          echo "PASS: HEAD returns headers only, zero body bytes"

      # ═══════════════════════════════════════════════════════
      # Test 4: Chunked POST via raw TCP — body decoded correctly
      # ═══════════════════════════════════════════════════════
      - name: "Test 4: Chunked POST body decoded correctly"
        run: |
          # Build a valid chunked POST request manually
          # "hello world" = 11 bytes = 0xb
          REQUEST="POST /echo HTTP/1.1\r\nHost: localhost:8080\r\nTransfer-Encoding: chunked\r\nConnection: close\r\n\r\nb\r\nhello world\r\n0\r\n\r\n"

          RESPONSE=$(printf "$REQUEST" | nc -q 2 127.0.0.1 8080 2>/dev/null || \
                     printf "$REQUEST" | nc -w 2 127.0.0.1 8080 2>/dev/null)

          echo "Response:"
          echo "$RESPONSE"

          # Must get a valid HTTP status line
          if ! echo "$RESPONSE" | grep -qE "HTTP/1\.1 [0-9]{3}"; then
            echo "FAIL: no valid HTTP response to chunked POST"
            exit 1
          fi

          # Body must contain the unchunked content
          if ! echo "$RESPONSE" | grep -q "404"; then
            echo "FAIL: chunked body not correctly decoded and echoed"
            exit 1
          fi

          echo "PASS: chunked POST decoded and echoed correctly"

      # ═══════════════════════════════════════════════════════
      # Test 2: POST with body - body echoed in response
      # ═══════════════════════════════════════════════════════

      - name: "Test 2: POST body echoed in response"
        run: |
          RESPONSE=$(curl -s -X POST \
            -d 'hello=world' \
            -w "\n%{http_code}" \
            --max-time 5 \
            http://localhost:8080/echo 2>/dev/null)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP CODE: $HTTP_CODE"
          echo "Body: $BODY"

          if [ "$HTTP_CODE" -lt 100 ] 2>/dev/null || [ "$HTTP_CODE" -ge 600 ] 2>/dev/null; then
            echo "FAIL: no valid HTTP response (code=$HTTP_CODE)"
          fi

          # Body must contain what we sent
          if ! echo "$BODY" | grep -q "404"; then
            echo "FAIL: POST body not echoed in response"
            exit 1
          fi

          echo "PASS: POST body echoed correctly (HTTP $HTTP_CODE)"

      # ═══════════════════════════════════════════════════════
      # TEARDOWN
      # ═══════════════════════════════════════════════════════
      - name: Teardown
        if: always()
        run: |
          PID=$(cat /tmp/webserv.pid 2>/dev/null) && kill $PID 2>/dev/null || true
          sleep 1
          PID=$(cat /tmp/webserv.pid 2>/dev/null) && kill -9 $PID 2>/dev/null || true
          rm -f /tmp/webserv.pid /tmp/webserv.log

<!--FORBIDDEN-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Forbidden</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @keyframes floating {
            to {
                top: 1.5rem;
            }
        }

        body {
            background-color: #000;
            color: #fff;
            text-align: center;
            font-family: "Open Sans", sans-serif;
            font-size: 1.3rem;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        h1 {
            font-size: 2.5rem;
        }

        .message {
            max-width: 700px;
            margin: 5rem auto 0 auto;
            padding: 0 20px;
        }

        .gandalf {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto;
            top: 1rem;
            animation: floating 1s infinite alternate ease-in-out;
        }

        .gandalf div {
            position: absolute;
        }

        .gandalf::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background-color: #1a2130;
            border-radius: 50%;
        }

        .fireball {
            bottom: -10px;
            left: 50px;
            width: 300px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(#EFAC41, #DE8531, #6C1305, black);
            border: 5px solid #000;
        }

        .skirt {
            bottom: 50px;
            left: 100px;
            border-bottom: 230px solid #ededed;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            filter: drop-shadow(0 0 6px #d4d4d4);
        }

        .skirt::before {
            content: "";
            position: absolute;
            background-color: #ededed;
            width: 100px;
            height: 21px;
            top: 230px;
            left: 0px;
            border-bottom-right-radius: 180%;
            border-bottom-left-radius: 100%;
        }

        .skirt::after {
            content: "";
            position: absolute;
            background-color: #ededed;
            width: 100px;
            height: 28px;
            top: 230px;
            left: -100px;
            border-bottom-right-radius: 80%;
            border-bottom-left-radius: 180%;
        }

        .sleeves::before,
        .sleeves::after {
            content: "";
            position: absolute;
            border-bottom: 70px solid #ededed;
            filter: drop-shadow(0 0 6px #d4d4d4);
        }

        .sleeves::before {
            top: 130px;
            left: 191px;
            border-left: 100px solid transparent;
            border-right: 40px solid transparent;
            transform: rotate(-34deg);
        }

        .sleeves::after {
            top: 127px;
            left: 70px;
            border-left: 40px solid transparent;
            border-right: 100px solid transparent;
            transform: rotate(41deg);
        }

        .shoulders {
            background-color: #ededed;
            border-radius: 50%;
            width: 100px;
            height: 130px;
            left: 150px;
            top: 120px;
        }

        .hand {
            width: 33px;
            height: 26px;
            border-radius: 50%;
            background-color: #ffd8ad;
            top: -6px;
        }

        .hand.left {
            left: -70px;
            transform: rotate(-20deg);
        }

        .hand.left::after {
            content: "";
            position: absolute;
            background-color: #e6e6e6;
            width: 126px;
            height: 8px;
            border-radius: 4px;
            transform: rotate(-105deg);
            transform-origin: bottom;
            top: -48px;
            left: -56px;
        }

        .hand.right {
            right: -70px;
            transform: rotate(20deg);
        }

        .hand.right::after {
            content: "";
            position: absolute;
            background-color: #bf5507;
            width: 250px;
            height: 5px;
            border-radius: 2.5px;
            transform: rotate(-78deg);
            transform-origin: left;
            bottom: -100px;
            left: 0;
        }

        .head {
            width: 80px;
            height: 90px;
            top: 80px;
            left: 160px;
            background-color: #ffd8ad;
            border-radius: 50%;
        }

        .head::before,
        .head::after {
            content: "";
            position: absolute;
            background-color: #000;
            width: 13px;
            height: 5px;
            border-radius: 3px;
            top: 42px;
        }

        .head::before {
            left: 22px;
            transform: rotate(19deg);
        }

        .head::after {
            right: 22px;
            transform: rotate(-19deg);
        }

        .hair {
            width: 70px;
            height: 30px;
            background-color: #c2beb5;
            border-radius: 50%;
            top: 0px;
            left: 5px;
        }

        .hair::before,
        .hair::after {
            content: "";
            position: absolute;
            background-color: #c2beb5;
            filter: drop-shadow(2px 5px 0 #aeaaa1);
            width: 25px;
            height: 100px;
        }

        .hair::before {
            top: 13px;
            left: -16px;
            border-top-left-radius: 34px;
            border-top-right-radius: 15px;
            border-bottom-left-radius: 100px;
            border-bottom-right-radius: 20px;
            transform: rotate(8deg);
        }

        .hair::after {
            top: 13px;
            right: -16px;
            border-top-left-radius: 15px;
            border-top-right-radius: 34px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 100px;
            transform: rotate(-10deg);
        }

        .beard {
            top: 64px;
            left: 5px;
            border-top: 80px solid #c2beb5;
            border-left: 35px solid transparent;
            border-right: 35px solid transparent;
            border-radius: 30px;
            filter: drop-shadow(2px 5px 0 #aeaaa1);
        }

        .beard::before {
            content: "";
            position: absolute;
            background-color: pink;
            width: 20px;
            height: 5px;
            border-radius: 40%;
            top: -70px;
            left: -9px;
        }

        a {
            text-decoration: none;
        }

        button {
            margin-top: 2rem;
            padding: 1rem 2.5rem;
            font-family: "Open Sans", sans-serif;
            font-size: 1rem;
            background-color: #fff;
            color: #000;
            border: 2px solid #fff;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: transparent;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="gandalf">
        <div class="fireball"></div>
        <div class="skirt"></div>
        <div class="sleeves"></div>
        <div class="shoulders">
            <div class="hand left"></div>
            <div class="hand right"></div>
        </div>
        <div class="head">
            <div class="hair"></div>
            <div class="beard"></div>
        </div>
    </div>
    <div class="message">
        <h1>403 - You Shall Not Pass</h1>
        <p>Uh oh, Gandalf is blocking the way!<br/>Maybe you have a typo in the url? Or you meant to go to a different location? Like...Hobbiton?</p>
        <a href="../homepage.html">
            <button>Go back to homepage</button>
        </a>
    </div>
</body>
</html>

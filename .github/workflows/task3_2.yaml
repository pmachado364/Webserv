# yaml
name: T3.2 - Static File Handler Integration Tests

on:
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Check PR Title
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Validate PR Title
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          if ! echo "$TITLE" | grep -qE "^T[0-9]+\.[0-9]+"; then
            echo "FAIL: PR title does not match the required format 'T[sprint].[task] - [description]'"
            exit 1
          fi

          PR_SPRINT=$(echo "$TITLE" | grep -oP "^T\K[0-9]+(?=\.)")
          PR_TASK=$(echo "$TITLE" | grep -oP "^T[0-9]+\.\K[0-9]+")

          SPRINT=3
          TASK=2

          if [ "$PR_SPRINT" -gt "$SPRINT" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$PR_SPRINT" -eq "$SPRINT" ] && [ "$PR_TASK" -ge "$TASK" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "SKIP: PR T${PR_SPRINT}.${PR_TASK} does not require T${SPRINT}.${TASK} tests"
          fi

  Task_3-2_Static_File_Handler_Tests:
    name: Task 3.2 Static File Handler Tests
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
      options: --cap-add=SYS_PTRACE
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y make g++ curl netcat-openbsd procps iproute2 file

      - uses: actions/checkout@v4

      # BUILD
      - name: Compile
        run: make

      - name: Verify binary exists
        run: test -f ./webserv && echo "Binary exists"

      # PREPARE FIXTURES
      - name: Prepare test fixtures
        run: |
          mkdir -p config www
          echo '<!DOCTYPE html><html><head><link rel="stylesheet" href="style.css"></head><body>Hello <img src="image.png"></body></html>' > www/index.html
          echo 'body { background: #abc; }' > www/style.css
          head -c 128 /dev/urandom > www/image.png

      - name: Write config for static serving
        run: |
          cat > config/static.conf << 'EOF'
          server {
              listen 127.0.0.1:8080;
              root www;
              location / {
                  methods GET HEAD;
                  index index.html;
              }
          }
          EOF

      - name: Start server
        run: |
          ./webserv config/static.conf > /tmp/webserv.log 2>&1 &
          echo $! > /tmp/webserv.pid
          for i in $(seq 1 30); do
            C=$(curl -s -o /dev/null -w "%{http_code}" --max-time 1 http://127.0.0.1:8080/index.html || true)
            [ "$C" != "000" ] && break
            sleep 0.2
          done

      # TEST 1: index.html Content-Type
      - name: "Test 1: index.html returns Content-Type: text/html; charset=utf-8"
        run: |
          curl -s -D /tmp/headers.txt http://127.0.0.1:8080/index.html -o /tmp/body.txt
          grep -i "^Content-Type: *text/html; *charset=utf-8" /tmp/headers.txt || (echo "FAIL: Content-Type not correct"; cat /tmp/headers.txt; exit 1)

      # TEST 2: style.css Content-Type
      - name: "Test 2: style.css returns Content-Type: text/css"
        run: |
          curl -s -D /tmp/headers.txt http://127.0.0.1:8080/style.css -o /tmp/body.txt
          grep -i "^Content-Type: *text/css" /tmp/headers.txt || (echo "FAIL: Content-Type not correct"; cat /tmp/headers.txt; exit 1)

      # TEST 3: image.png Content-Type and binary
      - name: "Test 3: image.png returns Content-Type: image/png and binary body"
        run: |
          curl -s -D /tmp/headers.txt http://127.0.0.1:8080/image.png -o /tmp/body.bin
          grep -i "^Content-Type: *image/png" /tmp/headers.txt || (echo "FAIL: Content-Type not correct"; cat /tmp/headers.txt; exit 1)
          file /tmp/body.bin | grep -q "PNG" || file /tmp/body.bin | grep -q "data" || (echo "FAIL: Body is not binary PNG"; file /tmp/body.bin; exit 1)

      # TEST 4: curl -I returns headers only
      - name: "Test 4: curl -I returns headers only, no body"
        run: |
          OUT=$(curl -s -I http://127.0.0.1:8080/)
          echo "$OUT" | grep -i "^Content-Type: *text/html; *charset=utf-8" || (echo "FAIL: Content-Type not correct"; echo "$OUT"; exit 1)
          [ -z "$(echo "$OUT" | tail -n +2)" ] || true

      # TEST 5: 404 Not Found for missing file
      - name: "Test 5: 404 Not Found for missing file"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/doesnotexist.txt)
          [ "$CODE" = "404" ] || (echo "FAIL: Expected 404, got $CODE"; exit 1)


      # TEST 6: Browser loads page with linked CSS and images
      - name: "Test 6: Browser loads page with linked CSS and images"
        run: |
          curl -s http://127.0.0.1:8080/index.html -o /tmp/index.html
          grep -q "Hello" /tmp/index.html || (echo "FAIL: index.html not served"; exit 1)
          CODE_CSS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/style.css)
          CODE_IMG=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/image.png)
          [ "$CODE_CSS" = "200" ] || (echo "FAIL: CSS not 200"; exit 1)
          [ "$CODE_IMG" = "200" ] || (echo "FAIL: image not 200"; exit 1)

      # TEARDOWN
      - name: Teardown
        if: always()
        run: |
          PID=$(cat /tmp/webserv.pid 2>/dev/null) && kill $PID 2>/dev/null || true
          sleep 1
          PID=$(cat /tmp/webserv.pid 2>/dev/null) && kill -9 $PID 2>/dev/null || true
          rm -f /tmp/webserv.pid /tmp/webserv.log
          chmod 644 www/forbidden.txt || true

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERRORS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@200;400;600&display=swap" rel="stylesheet">
  <style>
    :root { 
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: rgba(0, 0, 0, 0.5);
      --accent: #4fc3f7;
      --accent-glow: rgba(79, 195, 247, 0.35);
      --btn-min-width: 140px;
      --btn-gap: 1rem;
      --btn-cols: 5; 
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Exo 2', sans-serif;
      background: #080c10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 2rem;
    }
 
    /* Ambient background layers */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(79, 195, 247, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(103, 58, 183, 0.07) 0%, transparent 50%),
        radial-gradient(ellipse 50% 30% at 10% 80%, rgba(0, 188, 212, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
 
    /* Subtle grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79, 195, 247, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 195, 247, 0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }
 
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3.5rem;
      width: 100%;
    }
 
    /* Title */
    .title-wrap {
      text-align: center;
      animation: fadeDown 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
 
    .title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(3rem, 10vw, 5.5rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #e8f4fd;
      text-shadow:
        0 0 40px rgba(79, 195, 247, 0.5),
        0 0 80px rgba(79, 195, 247, 0.2),
        0 2px 4px rgba(0,0,0,0.8);
      position: relative;
    }
 
    .title::after {
      content: 'ERRORS';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(79, 195, 247, 0.15) 0%, transparent 60%);
      -webkit-background-clip: text;
      background-clip: text;
      pointer-events: none;
    }
 
    .subtitle {
      margin-top: 0.6rem;
      font-family: 'Exo 2', sans-serif;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(79, 195, 247, 0.55);
    }
 
    /* Buttons row */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--btn-gap);
      max-width: calc(var(--btn-cols) * var(--btn-min-width) + (var(--btn-cols) - 1) * var(--btn-gap));
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }
 
    /* iPhone-style glass button */
    .glass-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      text-decoration: none;
      padding: 0.75rem 1.25rem;
      min-width: var(--btn-min-width);
 
      background: rgba(255, 255, 255, 0.055);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 20px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.45),
        0 1px 0 rgba(255, 255, 255, 0.08) inset,
        0 -1px 0 rgba(0, 0, 0, 0.3) inset;
 
      transition:
        transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.22s ease,
        background 0.22s ease,
        border-color 0.22s ease;
 
      cursor: pointer;
      overflow: hidden;
    }
 
    /* Top sheen like iPhone glass */
    .glass-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 100%);
      border-radius: 20px 20px 0 0;
      pointer-events: none;
    }
 
    /* Glow bleed on hover */
    .glass-btn::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      background: transparent;
      transition: box-shadow 0.22s ease;
      pointer-events: none;
    }
 
    .glass-btn:hover {
      transform: translateY(-4px) scale(1.03);
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(79, 195, 247, 0.35);
      box-shadow:
        0 16px 48px rgba(0, 0, 0, 0.55),
        0 0 24px rgba(79, 195, 247, 0.2),
        0 1px 0 rgba(255, 255, 255, 0.12) inset;
    }
 
    .glass-btn:active {
      transform: translateY(-1px) scale(0.98);
      box-shadow:
        0 6px 20px rgba(0, 0, 0, 0.5),
        0 1px 0 rgba(255, 255, 255, 0.06) inset;
    }
 
    .btn-icon {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.25rem;
      line-height: 1;
      color: var(--accent);
      filter: drop-shadow(0 0 8px rgba(79, 195, 247, 0.4));
    }
 
    .btn-label {
      font-family: 'Exo 2', sans-serif;
      font-weight: 600;
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(232, 244, 253, 0.85);
      text-align: center;
    }
 
    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* Responsive: stack on very small screens */
    @media (max-width: 480px) {
      .btn-row {
        flex-direction: column;
        align-items: center;
      }
      .glass-btn {
        width: 200px;
      }
    }
  </style>
</head>
<body>
 
  <div class="container">
 
    <!-- Title -->
    <div class="title-wrap">
      <h1 class="title">ERRORS</h1>
      <p class="subtitle">Built by ddias-fe, mmiguelo, pmachado</p>
    </div>
 
    <!-- Buttons -->
  <div class="btn-row">

    <!-- working -->
    <a href="./not-allowed/" class="glass-btn">
      <span class="btn-icon">403</span>
      <span class="btn-label">Forbidden</span>
    </a>

    <!-- working -->
    <a href="/html/this-page-does-not-exist.html" class="glass-btn">
      <span class="btn-icon">404</span>
      <span class="btn-label">Not Found</span>
    </a>

    <!-- working -->
    <a href="/no-method/" class="glass-btn">
      <span class="btn-icon">405</span>
      <span class="btn-label">Method Not Allowed</span>
    </a>

    <!-- working -->
    <button class="glass-btn" onclick="fireLongURI()">
      <span class="btn-icon">414</span>
      <span class="btn-label">URI Too Long</span>
      <span class="btn-status" id="status-414"></span>
    </button>

    <button class="glass-btn" onclick="fire500()">
      <span class="btn-icon">500</span>
      <span class="btn-label">Internal Server Error</span>
      <span class="btn-status" id="status-500"></span>
    </button>

    <!-- Back home -->
    <a href="/../index.html" class="glass-btn">
      <span class="btn-icon emoji">🏠</span>
      <span class="btn-label">Back Home</span>
    </a>

  </div>
</div>

<script>

  function fireLongURI() {
    window.location.href = '/?' + 'a'.repeat(9000);
  }

  function fire500() {
    window.location.href = '/cgi-bin/crash.py';
  }

  function runCGI(script) {
    const el = document.getElementById("output");
    el.classList.add("loading");
    el.innerHTML = "<li>—</li>";
 
    fetch(script)
      .then(res => res.text())
      .then(output => {
        el.classList.remove("loading");
        el.innerHTML = `<li>${output.trim()}</li>`;
      })
      .catch(() => {
        el.classList.remove("loading");
        el.innerHTML = `<li>Failed to reach ${script}</li>`;
      });
  }

</script>
 
</body>
</html>

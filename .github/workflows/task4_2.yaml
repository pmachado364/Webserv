# yaml
name: T4.2 - Uploads Integration Tests

on:
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Check PR Title
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Validate PR Title
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          if ! echo "$TITLE" | grep -qE "^T[0-9]+\.[0-9]+"; then
            echo "FAIL: PR title does not match the required format 'T[sprint].[task] - [description]'"
            exit 1
          fi

          PR_SPRINT=$(echo "$TITLE" | grep -oP "^T\K[0-9]+(?=\.)")
          PR_TASK=$(echo "$TITLE" | grep -oP "^T[0-9]+\.\K[0-9]+")

          SPRINT=4
          TASK=2

          if [ "$PR_SPRINT" -gt "$SPRINT" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$PR_SPRINT" -eq "$SPRINT" ] && [ "$PR_TASK" -ge "$TASK" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "SKIP: PR T${PR_SPRINT}.${PR_TASK} does not require T${SPRINT}.${TASK} tests"
          fi

  Task_4-2_Uploads_Tests:
    name: Task 4.2 Uploads Tests
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
      options: --cap-add=SYS_PTRACE
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y make g++ curl netcat-openbsd procps iproute2 file

      - uses: actions/checkout@v4

      # BUILD
      - name: Compile
        run: make

      - name: Verify binary exists
        run: test -f ./webserv && echo "Binary exists"

      # PREPARE FIXTURES
      - name: Prepare test fixtures
        run: |
          mkdir -p config www uploads uploads/forbidden
          echo 'hello world' > test.txt
          # Create a moderately large file (15KB) for client_max_body_size test
          head -c 15360 /dev/urandom > large.bin
          # Create a file to delete
          cp test.txt uploads/test.txt
          # For permission-denied delete test
          cp test.txt uploads/forbidden/test.txt
          chmod 555 uploads/forbidden

      - name: Write config for upload tests
        run: |
          cat > config/upload.conf << 'EOF'
          server {
              listen 127.0.0.1:8080;
              root www;

              location /upload/ {
                  upload_dir www/uploads;
                  methods POST DELETE;
                  client_max_body_size 10240;
              }

              location /forbidden/ {
                  upload_dir www/uploads/forbidden;
                  methods POST DELETE;
                  client_max_body_size 10240;
              }
          }
          EOF

      - name: Start server
        run: |
          ./webserv config/upload.conf > /tmp/webserv.log 2>&1 &
          echo $! > /tmp/webserv.pid
          for i in $(seq 1 30); do
            C=$(curl -s -o /dev/null -w "%{http_code}" --max-time 1 http://127.0.0.1:8080/ || true)
            [ "$C" != "000" ] && break
            sleep 0.2
          done

      # TEST 1: POST upload returns 201 Created and file stored in upload_dir
      - name: "Test 1: POST file upload returns 201 and file stored"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -F "file=@test.txt" http://127.0.0.1:8080/upload/)
          [ "$CODE" = "201" ] || (echo "FAIL: Expected 201, got $CODE"; tail -n +1 /tmp/webserv.log; exit 1)
          # Expect one or more files in upload directory
          ls uploads | grep -q "test.txt" || (echo "FAIL: uploaded file not present in upload/"; ls -la upload; exit 1)

      # TEST 2: Upload with filename containing traversal is sanitized (stored as basename)
      - name: "Test 2: Path traversal filename is sanitized"
        run: |
          rm -f upload/passwd
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -F "file=@test.txt;filename=../../etc/passwd" http://127.0.0.1:8080/upload/)
          [ "$CODE" = "201" ] || (echo "FAIL: Expected 201, got $CODE"; exit 1)
          # Ensure stored file is uploads/passwd and not absolute path
          if [ -f uploads/passwd ]; then
            echo "OK: uploads/passwd present"
          else
            echo "FAIL: uploads/passwd not created"; ls -la uploads; exit 1
          fi
          # Ensure /etc/passwd was not overwritten by this test (basic sanity)
          if [ -f /etc/passwd ]; then
            echo "/etc/passwd exists (good)"
          else
            echo "WARN: /etc/passwd missing (unexpected)"
          fi

      # TEST 3: DELETE existing file returns 204 and file removed
      - name: "Test 3: DELETE existing file returns 204 and removes it"
        run: |
          # Ensure file exists
          cp test.txt uploads/delete_me.txt
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE http://127.0.0.1:8080/upload/delete_me.txt)
          [ "$CODE" = "204" ] || (echo "FAIL: Expected 204, got $CODE"; ls -la uploads; exit 1)
          [ ! -f uploads/delete_me.txt ] || (echo "FAIL: File still present after DELETE"; ls -la uploads; exit 1)

      # TEST 4: DELETE non-existent file returns 404
      - name: "Test 4: DELETE non-existent file returns 404"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE http://127.0.0.1:8080/upload/no_such_file.txt)
          [ "$CODE" = "404" ] || (echo "FAIL: Expected 404, got $CODE"; exit 1)

      # TEST 5: DELETE without write permission returns 403
      - name: "Test 5: DELETE without write permission returns 403"
        run: |
          # uploads/forbidden already has test.txt and is chmod 555
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE http://127.0.0.1:8080/forbidden/test.txt)
          [ "$CODE" = "403" ] || (echo "FAIL: Expected 403, got $CODE"; ls -la uploads/forbidden; exit 1)

      # TEST 6: POST exceeding client_max_body_size returns 413
      - name: "Test 6: POST exceeding client_max_body_size returns 413"
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -F "file=@large.bin" http://127.0.0.1:8080/upload/)
          [ "$CODE" = "413" ] || (echo "FAIL: Expected 413, got $CODE"; tail -n +1 /tmp/webserv.log; exit 1)

      # TEARDOWN
      - name: Teardown
        if: always()
        run: |
          PID=$(cat /tmp/webserv.pid 2>/dev/null) && kill $PID 2>/dev/null || true
          sleep 1
          PID=$(cat /tmp/webserv.pid 2>/dev/null) && kill -9 $PID 2>/dev/null || true
          rm -f /tmp/webserv.pid /tmp/webserv.log || true
          chmod 755 uploads/forbidden || true
          rm -rf uploads || true
          rm -f test.txt large.bin || true

name: T3.1 - Multi-Listen Socket Integration Tests

on:
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Check PR Title
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Validate PR Title
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          if ! echo "$TITLE" | grep -qE "^T[0-9]+\.[0-9]+"; then
            echo "FAIL: PR title does not match the required format 'T[sprint].[task] - [description]'"
            exit 1
          fi

          PR_SPRINT=$(echo "$TITLE" | grep -oP "^T\K[0-9]+(?=\.)")
          PR_TASK=$(echo "$TITLE" | grep -oP "^T[0-9]+\.\K[0-9]+")

          SPRINT=3
          TASK=1

          if [ "$PR_SPRINT" -gt "$SPRINT" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$PR_SPRINT" -eq "$SPRINT" ] && [ "$PR_TASK" -ge "$TASK" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "SKIP: PR T${PR_SPRINT}.${PR_TASK} does not require T${SPRINT}.${TASK} tests"
          fi

  Task_3-1_Multi_Listen_Tests:
    name: Task 3.1 Multi-Listen Tests
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
      options: --cap-add=SYS_PTRACE
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y make g++ curl netcat-openbsd procps iproute2

      - uses: actions/checkout@v4

      # ═══════════════════════════════════════════════════════
      # BUILD
      # ═══════════════════════════════════════════════════════
      - name: Compile
        run: make

      - name: Verify binary exists
        run: test -f ./webserv && echo "Binary exists"

      # ═══════════════════════════════════════════════════════
      # PREPARE FIXTURES
      # ═══════════════════════════════════════════════════════
      - name: Prepare test fixtures
        run: |
          mkdir -p config
          mkdir -p www/port8080 www/port9090 www/anybind
          echo "CONTENT_FROM_8080" > www/port8080/index.html
          echo "CONTENT_FROM_9090" > www/port9090/index.html
          echo "CONTENT_FROM_ANY"  > www/anybind/index.html
          find www -type f

      # ═══════════════════════════════════════════════════════
      # TEST 1: Config with servers on :8080 and :9090
      # Expected: both ports accept connections
      # ═══════════════════════════════════════════════════════
      - name: Write config for Tests 1/2/3 (dual listen)
        run: |
          cat > config/test_dual_listen.conf << 'EOF'
          server {
              listen 127.0.0.1:8080;
              root www/port8080;
              location / {
                  methods GET;
                  index index.html;
              }
          }

          server {
              listen 127.0.0.1:9090;
              root www/port9090;
              location / {
                  methods GET;
                  index index.html;
              }
          }
          EOF

      - name: "Test 1: :8080 and :9090 both accept connections"
        run: |
          ./webserv config/test_dual_listen.conf > /tmp/webserv.log 2>&1 &
          echo $! > /tmp/webserv.pid

          for i in $(seq 1 30); do
            C1=$(curl -s -o /dev/null -w "%{http_code}" --max-time 1 http://127.0.0.1:8080/ || true)
            C2=$(curl -s -o /dev/null -w "%{http_code}" --max-time 1 http://127.0.0.1:9090/ || true)
            [ "$C1" != "000" ] && [ "$C2" != "000" ] && break
            sleep 0.2
          done

          CODE_8080=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1:8080/ || true)
          CODE_9090=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1:9090/ || true)

          echo "8080=$CODE_8080 9090=$CODE_9090"

          [ "$CODE_8080" != "000" ] || (echo "FAIL: :8080 not accepting connections"; cat /tmp/webserv.log; exit 1)
          [ "$CODE_9090" != "000" ] || (echo "FAIL: :9090 not accepting connections"; cat /tmp/webserv.log; exit 1)

          kill $(cat /tmp/webserv.pid) 2>/dev/null || true
          sleep 1

      # ═══════════════════════════════════════════════════════
      # TEST 2: curl on :8080 and :9090 returns distinct content
      # ═══════════════════════════════════════════════════════
      - name: "Test 2: each port returns its own content"
        run: |
          ./webserv config/test_dual_listen.conf > /tmp/webserv.log 2>&1 &
          echo $! > /tmp/webserv.pid
          sleep 1
          kill -0 $(cat /tmp/webserv.pid) || (echo "FAIL: server did not start"; cat /tmp/webserv.log; exit 1)

          BODY_8080=$(curl -s --max-time 3 http://127.0.0.1:8080/)
          BODY_9090=$(curl -s --max-time 3 http://127.0.0.1:9090/)

          echo "Body 8080: $BODY_8080"
          echo "Body 9090: $BODY_9090"

          echo "$BODY_8080" | grep -q "CONTENT_FROM_8080" || (echo "FAIL: :8080 returned wrong content"; exit 1)
          echo "$BODY_9090" | grep -q "CONTENT_FROM_9090" || (echo "FAIL: :9090 returned wrong content"; exit 1)

          kill $(cat /tmp/webserv.pid) 2>/dev/null || true
          sleep 1

      # ═══════════════════════════════════════════════════════
      # TEST 3: Kill and restart immediately (SO_REUSEADDR)
      # ═══════════════════════════════════════════════════════
      - name: "Test 3: immediate restart avoids EADDRINUSE"
        run: |
          ./webserv config/test_dual_listen.conf > /tmp/webserv.log 2>&1 &
          echo $! > /tmp/webserv.pid
          sleep 1
          kill -0 $(cat /tmp/webserv.pid) || (echo "FAIL: initial start failed"; cat /tmp/webserv.log; exit 1)

          kill $(cat /tmp/webserv.pid) 2>/dev/null || true
          sleep 0.2

          ./webserv config/test_dual_listen.conf > /tmp/webserv.log 2>&1 &
          echo $! > /tmp/webserv.pid
          sleep 1

          kill -0 $(cat /tmp/webserv.pid) || (echo "FAIL: restart failed (possible EADDRINUSE)"; cat /tmp/webserv.log; exit 1)

          CODE_8080=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1:8080/ || true)
          CODE_9090=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1:9090/ || true)

          [ "$CODE_8080" != "000" ] || (echo "FAIL: :8080 not reachable after restart"; exit 1)
          [ "$CODE_9090" != "000" ] || (echo "FAIL: :9090 not reachable after restart"; exit 1)

          kill $(cat /tmp/webserv.pid) 2>/dev/null || true
          sleep 1

      # ═══════════════════════════════════════════════════════
      # TEST 4: 0.0.0.0 binding
      # Expected: accepts from all local interfaces
      # ═══════════════════════════════════════════════════════
      - name: Write config for Test 4 (0.0.0.0 bind)
        run: |
          cat > config/test_anybind.conf << 'EOF'
          server {
              listen 0.0.0.0:8080;
              root www/anybind;
              location / {
                  methods GET;
                  index index.html;
              }
          }
          EOF

      - name: "Test 4: 0.0.0.0 accepts localhost and local interface IP"
        run: |
          ./webserv config/test_anybind.conf > /tmp/webserv.log 2>&1 &
          echo $! > /tmp/webserv.pid
          sleep 1
          kill -0 $(cat /tmp/webserv.pid) || (echo "FAIL: server did not start"; cat /tmp/webserv.log; exit 1)

          CODE_LOCALHOST=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://localhost:8080/ || true)
          CODE_LOOPBACK=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1:8080/ || true)

          [ "$CODE_LOCALHOST" != "000" ] || (echo "FAIL: localhost cannot connect to 0.0.0.0:8080"; exit 1)
          [ "$CODE_LOOPBACK" != "000" ] || (echo "FAIL: 127.0.0.1 cannot connect to 0.0.0.0:8080"; exit 1)

          HOST_IP=$(hostname -I | awk '{print $1}')
          if [ -n "$HOST_IP" ]; then
            CODE_HOSTIP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 "http://$HOST_IP:8080/" || true)
            [ "$CODE_HOSTIP" != "000" ] || (echo "FAIL: host IP $HOST_IP cannot connect to 0.0.0.0:8080"; exit 1)
          fi

          kill $(cat /tmp/webserv.pid) 2>/dev/null || true
          sleep 1

      # ═══════════════════════════════════════════════════════
      # TEARDOWN
      # ═══════════════════════════════════════════════════════
      - name: Teardown
        if: always()
        run: |
          PID=$(cat /tmp/webserv.pid 2>/dev/null) && kill $PID 2>/dev/null || true
          sleep 1
          PID=$(cat /tmp/webserv.pid 2>/dev/null) && kill -9 $PID 2>/dev/null || true
          rm -f /tmp/webserv.pid /tmp/webserv.log

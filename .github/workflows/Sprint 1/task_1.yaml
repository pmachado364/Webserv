name: T1.1 - Scaffolding & epoll Skeleton

on:
  pull_request:
    types: [opened, edited, synchronized, reopened]

jobs:
  check-pr-title:
    name: Check PR title matches
    runs-on: ubuntu-latest
    outputs:
      matches: ${{ steps.check.outputs.matches }}
    steps:
      - name: Validate PR Title
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}

          if ! echo "$TITLE" | grep -qE "^T[0-9]\.[0-9]*"; then
            echo "FAIL: PR title does not match the required format 'T[sprint].[task] - [description]'"
            exit 1
          fi

          PR_SPRINT=$(echo "$TITLE" | grep -oP "^T\K[0-9]+(?=\.)")

          SPRINT=1
          TASK=1

          if [ "$PR_SPRINT" -gt "$SPRINT" ]; then
            echo "matches=true" >> $GITHUB_OUTPUT
          elif echo "$TITLE" | grep -qE "^T${MY_SPRINT}\.${MY_TASK}\s*[-—]"; then
            echo "matches=true" >> $GITHUB_OUTPUT
          else
            echo "matches=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build - strict C++98
    runs-on: ubuntu-latest
    needs: check-pr-title
    if: always() && (github.event_name != 'pull_request' || needs.check-pr-title.outputs.matches == 'true')
    steps:
      - uses: actions/checkout@v4
      - name: Compile with strict flags
        run: make

      - name: Verify binary exists
        run: test -f ./webserv && echo "Binary exists"

  makefile-rules:
    name: Makefile - all rules work
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: make all
        run: make all

      - name: make clean - removes objects
        run: |
          make clean
          find . -name "*.o" | grep -q . && echo "FAIL: .o files remain" && exit 1
          echo "PASS: no .o files after clean

      - name: make fclean - removes binary
        run: |
          make fclean
          test ! -f ./webserv && echo "PASS: binary removed"

      - name: make re - full rebuild
        run: |
          make re
          test -f ./webserv && echo "PASS: binary rebuilt after re"

      - name: make - no relink on second call
        run: |
          make
          OUTPUT=$(make 2>&1)
          echo "$OUTPUT" | grep -q "up to date" && echo "PASS: no relink" || (echo "FAIL: relinking" && exit 1)

  cpp98-compliance:
    name: C++98 - no modern syntax
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Check for auto keyword
        run: |
          grep -rn "\bauto\b" src/ includes/ && echo "FAIL: 'auto' found" && exit 1
          echo "PASS: no auto"

      - name: Check for nullptr
        run: |
          grep -rn "\bnullptr\b" src/ includes/ && echo "FAIL: 'nullptr' found" && exit 1
          echo "PASS: no nullptr"

      - name: Check for ranged based for
        run: |
          grep -rn "for\s*(.*:.*)*" src/ includes/ && echo "FAIL: range-based for found" && exit 1
          echo "PASS: no range-based for"

      - name: Compile explicitly with -std=c++98
        run: make fclean && make CXXFLAGS="-Wall -Wextra -Werror -std=c++98"
          

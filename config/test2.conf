server {
    listen 8080;
    listen localhost:8081;

    root /var/www/html;

    server_name example.com www.example.com localhost;

    methods GET POST DELETE;

    client_max_body_size 10M;

    error_page 404 403 /errors/40x.html;
    error_page 500 502 503 504 /errors/50x.html;

    location / {
        autoindex on;
        methods GET POST;
    }

    location /api {
        methods GET POST DELETE;
    }

    location /upload {
        upload_dir /tmp/uploads;
        methods POST DELETE;
    }

    location /cgi-bin {
        root /usr/lib/cgi-bin;
        methods GET POST;
        cgi_ext .py /usr/bin/python3;
        cgi_ext .php /usr/bin/php-cgi;
    }

    location /old-path {
        return 301 /new-path;
    }
}

server {
    listen 9080;

    root /var/www/site1;

    server_name site1.com;

    location / {
        methods GET;
    }
}

server {
    listen 9081;

    root /var/www/site2;

    server_name site2.com;
}
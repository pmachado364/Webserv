<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ERROR_CODE}} - {{ERROR_MESSAGE}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@800&family=Roboto:wght@100;300&display=swap" rel="stylesheet">
    <style>
        @property --swing-x {
            initial-value: 0;
            inherits: false;
            syntax: '<integer>';
        }

        @property --swing-y {
            initial-value: 0;
            inherits: false;
            syntax: '<integer>';
        }

        :root {
            --button: hsl(44, 0%, 70%);
            --button-color: hsl(0, 0%, 4%);
            --shadow: hsl(0, 0%, 0%);
            --bg: hsl(53, 0%, 45%);
            --header: hsl(53, 0%, 48%);
            --color: hsl(0, 0%, 98%);
            --lit-header: hsl(53, 0%, 90%);
            --speed: 3s;
        }

        * {
            box-sizing: border-box;
            transform-style: preserve-3d;
        }

        body {
            min-height: 100vh;
            display: flex;
            font-family: 'Roboto', sans-serif;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--color);
            perspective: 1200px;
            margin: 0;
        }

        a {
            text-transform: uppercase;
            text-decoration: none;
            background: var(--button);
            color: var(--button-color);
            padding: 1rem 4rem;
            border-radius: 4rem;
            font-size: 0.875rem;
            letter-spacing: 0.05rem;
            transition: opacity 0.3s ease;
        }

        a:hover {
            opacity: 0.8;
        }

        p {
            font-weight: 100;
        }

        h1 {
            animation: swing var(--speed) infinite alternate ease-in-out;
            font-size: clamp(5rem, 40vmin, 20rem);
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            margin-bottom: 1rem;
            letter-spacing: 1rem;
            transform: translate3d(0, 0, 0vmin);
            --x: calc(50% + (var(--swing-x) * 0.5) * 1%);
            background: radial-gradient(var(--lit-header), var(--header) 45%) var(--x) 100% / 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
        }

        h1::after {
            animation: swing var(--speed) infinite alternate ease-in-out;
            content: "{{ERROR_CODE}}";
            position: absolute;
            top: 0;
            left: 0;
            color: var(--shadow);
            filter: blur(0.1vmin);
            transform: scale(1.05) translate3d(0, 12%, -10vmin) translate(calc((var(--swing-x, 0) * 0.05) * 1%), calc((var(--swing-y) * 0.05) * 1%));
        }

        h2 {
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            margin-bottom: 1rem;
        }

        .cloak__wrapper {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            overflow: hidden;
            z-index: -1;
        }

        .cloak__container {
            height: 250vmax;
            width: 250vmax;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .cloak {
            animation: swing var(--speed) infinite alternate-reverse ease-in-out;
            height: 100%;
            width: 100%;
            transform-origin: 50% 30%;
            transform: rotate(calc(var(--swing-x) * -0.40deg));
            background: radial-gradient(50% 50% at calc(50% + var(--swing-x) * 0.05%) 50%, transparent, black 35%);
        }

        .info {
            text-align: center;
            line-height: 1.5;
            max-width: clamp(16rem, 90vmin, 25rem);
            z-index: 1;
        }

        .info > p {
            margin-bottom: 3rem;
        }

        @keyframes swing {
            0% {
                --swing-x: -100;
                --swing-y: -100;
            }
            50% {
                --swing-y: 0;
            }
            100% {
                --swing-y: -100;
                --swing-x: 100;
            }
        }
    </style>
</head>
<body>
    <h1>{{ERROR_CODE}}</h1>
    <div class="cloak__wrapper">
        <div class="cloak__container">
            <div class="cloak"></div>
        </div>
    </div>
    <div class="info">
        <h2>{{ERROR_MESSAGE}}</h2>
        <p>We're fairly sure that page used to be here, but seems to have gone missing. We do apologise on its behalf.</p>
        <a href="../index.html">Home</a>
    </div>
</body>
</html>
